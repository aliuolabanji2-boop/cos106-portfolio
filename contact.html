</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>

            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h1>Contact Me</h1>
            <p>If you have any questions or would like to collaborate, please send me a message!</p>

            <form id="contact-form">
                
                <div id="form-errors" class="error-messages"></div>

                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number (digits only)">
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" placeholder="Write your message here..."></textarea>
                </div>

                <button type="submit" id="submit-btn">Send Message</button>
            </form>
        </section>
    </main>

    <footer>

    </footer>

    <script src="script.js"></script>
</body>
